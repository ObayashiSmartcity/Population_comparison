<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>都市別人口データ ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .header {
            text-align: center;
            padding: 30px 20px 10px;
            margin-bottom: 10px;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #00e5ff, #00e676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .header p {
            color: #8899aa;
            font-size: 0.95rem;
        }
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 28px;
        }
        .card {
            background: rgba(18, 24, 38, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            border: 1px solid rgba(0, 229, 255, 0.12);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 229, 255, 0.10);
            border-color: rgba(0, 229, 255, 0.25);
        }
        .card h2 {
            font-size: 1.15rem;
            color: #b0c4d8;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(0, 229, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2 .icon {
            font-size: 1.3rem;
        }
        .chart-container {
            position: relative;
            height: 420px;
            width: 100%;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }
        @media (max-width: 900px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
        .footer {
            text-align: center;
            padding: 30px 0 10px;
            color: #556;
            font-size: 0.8rem;
        }
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #1a2a3a;
            border-top: 5px solid #00e5ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #8899aa;
            font-size: 1rem;
        }
        /* Error message */
        .error-message {
            display: none;
            max-width: 600px;
            margin: 80px auto;
            background: #1a1215;
            border: 1px solid #e53e3e;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            color: #fc8181;
        }
        .error-message h2 {
            margin-bottom: 8px;
            border: none;
            justify-content: center;
            color: #fc8181;
        }
        .error-message p {
            color: #fbb6b6;
            font-size: 0.9rem;
            line-height: 1.7;
        }
        .error-message code {
            background: #2d1b1b;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">データを読み込み中...</div>
    </div>

    <!-- Error message (hidden by default) -->
    <div class="error-message" id="errorMsg">
        <h2>⚠️ データ読み込みエラー</h2>
        <p id="errorDetail"></p>
    </div>

    <div id="mainContent" style="display:none;">
        <div class="header">
            <h1>📊 都市別人口データ ダッシュボード</h1>
            <p>10都市の人口構成を男女別・年齢階級別に可視化</p>
        </div>

        <div class="dashboard">
            <!-- Chart 1: Total Population -->
            <div class="card">
                <h2><span class="icon">🏙️</span> 都市別 総人口比較</h2>
                <div class="chart-container">
                    <canvas id="chart1"></canvas>
                </div>
            </div>

            <!-- Chart 2: Male vs Female -->
            <div class="card">
                <h2><span class="icon">👫</span> 都市別 男女別人口比較</h2>
                <div class="chart-container">
                    <canvas id="chart2"></canvas>
                </div>
            </div>

            <div class="grid-2">
                <!-- Chart 3: Age Group Stacked -->
                <div class="card">
                    <h2><span class="icon">📈</span> 年齢階級別人口（実数）</h2>
                    <div class="chart-container" style="height:480px;">
                        <canvas id="chart3"></canvas>
                    </div>
                </div>

                <!-- Chart 4: 100% Stacked -->
                <div class="card">
                    <h2><span class="icon">📊</span> 年齢階級別人口（構成比 %）</h2>
                    <div class="chart-container" style="height:480px;">
                        <canvas id="chart4"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            データ出典: TABLE01 男女別人口.json / TABLE03 年齢階級別人口.json
        </div>
    </div>

    <script>
        // ============================================================
        // JSONファイルを同一ディレクトリから fetch() で読み込み
        // ============================================================

        // カラーパレット：青・緑系（富山市のみハイライト）
        // 富山市 = #FFD600（ゴールド）、その他 = 青緑系
        const BLUE_GREEN_PALETTE = [
            '#00e5ff', '#00bfa5', '#1de9b6', '#00b0ff',
            '#0091ea', '#26a69a', '#2979ff', '#00c853',
            '#18ffff', '#64ffda'
        ];
        const HIGHLIGHT_COLOR = '#FFD600';  // 富山市ハイライト

        function getCityColors(labels) {
            return labels.map(name => name === '富山市' ? HIGHLIGHT_COLOR : BLUE_GREEN_PALETTE[labels.indexOf(name) % BLUE_GREEN_PALETTE.length]);
        }

        // Chart.js グローバルダークテーマ設定
        Chart.defaults.color = '#b0c4d8';
        Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';

        async function init() {
            try {
                const [res1, res2] = await Promise.all([
                    fetch('TABLE01 男女別人口.json'),
                    fetch('TABLE03 年齢階級別人口.json')
                ]);

                if (!res1.ok) throw new Error(`TABLE01 男女別人口.json の読み込みに失敗しました (HTTP ${res1.status})`);
                if (!res2.ok) throw new Error(`TABLE03 年齢階級別人口.json の読み込みに失敗しました (HTTP ${res2.status})`);

                const genderData = await res1.json();
                const ageData = await res2.json();

                // --- 性別データのパース ---
                const citiesTotal = {}, citiesMale = {}, citiesFemale = {};
                for (const [city, type, , pop] of genderData) {
                    const p = parseInt(pop);
                    if (type === '男女計') citiesTotal[city] = p;
                    else if (type === '男') citiesMale[city] = p;
                    else if (type === '女') citiesFemale[city] = p;
                }

                // --- 年齢データのパース ---
                const citiesYoung = {}, citiesWorking = {}, citiesElderly = {}, citiesLateElderly = {};
                for (const [city, category, , pop] of ageData) {
                    const p = parseInt(pop);
                    if (category.includes('年少人口')) citiesYoung[city] = p;
                    else if (category.includes('生産年齢人口')) citiesWorking[city] = p;
                    else if (category.includes('老年人口')) citiesElderly[city] = p;
                    else if (category.includes('後期高齢者数')) citiesLateElderly[city] = p;
                }

                // --- 総人口降順でソート ---
                const sortedCities = Object.keys(citiesTotal).sort((a, b) => citiesTotal[b] - citiesTotal[a]);

                const shortName = (city) => {
                    if (city.includes('県')) return city.split('県')[1];
                    if (city.includes('道')) return city.split('道')[1];
                    return city;
                };

                const labels = sortedCities.map(shortName);
                const fullNames = sortedCities;
                const totalPops = sortedCities.map(c => citiesTotal[c]);
                const malePops = sortedCities.map(c => citiesMale[c]);
                const femalePops = sortedCities.map(c => citiesFemale[c]);
                const youngPops = sortedCities.map(c => citiesYoung[c]);
                const workingPops = sortedCities.map(c => citiesWorking[c]);
                const earlyElderlyPops = sortedCities.map(c => citiesElderly[c] - citiesLateElderly[c]);
                const lateElderlyPops = sortedCities.map(c => citiesLateElderly[c]);

                const youngRatio = [], workingRatio = [], earlyElderlyRatio = [], lateElderlyRatio = [];
                for (const c of sortedCities) {
                    const total = citiesYoung[c] + citiesWorking[c] + citiesElderly[c];
                    youngRatio.push(Math.round(citiesYoung[c] / total * 1000) / 10);
                    workingRatio.push(Math.round(citiesWorking[c] / total * 1000) / 10);
                    earlyElderlyRatio.push(Math.round((citiesElderly[c] - citiesLateElderly[c]) / total * 1000) / 10);
                    lateElderlyRatio.push(Math.round(citiesLateElderly[c] / total * 1000) / 10);
                }

                const tooltipTitle = (items) => fullNames[items[0].dataIndex];

                // 富山市のインデックスを特定
                const toyamaIdx = labels.indexOf('富山市');

                // Chart 1用：都市別カラー（富山市だけゴールド）
                const chart1Colors = getCityColors(labels);

                // Chart 2用：男女別（富山市だけハイライト）
                const maleColors = labels.map(name => name === '富山市' ? '#FFD600' : 'rgba(0, 176, 255, 0.75)');
                const femaleColors = labels.map(name => name === '富山市' ? '#FFAB00' : 'rgba(0, 230, 118, 0.75)');

                // Chart 3&4用：年齢層別カラー
                const ageColors = {
                    young:        { normal: 'rgba(0, 230, 118, 0.8)',  highlight: 'rgba(255, 214, 0, 0.9)' },
                    working:      { normal: 'rgba(0, 176, 255, 0.8)',  highlight: 'rgba(255, 171, 0, 0.9)' },
                    earlyElderly: { normal: 'rgba(0, 191, 165, 0.8)',  highlight: 'rgba(255, 214, 0, 0.7)' },
                    lateElderly:  { normal: 'rgba(41, 121, 255, 0.8)', highlight: 'rgba(255, 171, 0, 0.7)' }
                };

                function ageBarColors(colorSet) {
                    return labels.map(name => name === '富山市' ? colorSet.highlight : colorSet.normal);
                }

                // ==================== グラフ描画 ====================

                // --- Chart 1: 総人口 ---
                new Chart(document.getElementById('chart1'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '総人口（人）',
                            data: totalPops,
                            backgroundColor: chart1Colors,
                            borderRadius: 8,
                            borderSkipped: false,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(10,15,25,0.9)',
                                titleColor: '#00e5ff',
                                bodyColor: '#e0e0e0',
                                borderColor: 'rgba(0,229,255,0.3)',
                                borderWidth: 1,
                                callbacks: {
                                    title: tooltipTitle,
                                    label: (ctx) => `人口: ${ctx.raw.toLocaleString()} 人`
                                }
                            },
                            datalabels: {
                                anchor: 'end',
                                align: 'top',
                                font: { size: 11, weight: 'bold' },
                                formatter: (v) => v.toLocaleString(),
                                color: (ctx) => labels[ctx.dataIndex] === '富山市' ? '#FFD600' : '#8899aa'
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { callback: (v) => v.toLocaleString() + ' 人', color: '#8899aa' },
                                grid: { color: 'rgba(255,255,255,0.04)' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: {
                                    color: (ctx) => labels[ctx.index] === '富山市' ? '#FFD600' : '#8899aa',
                                    font: (ctx) => ({ weight: labels[ctx.index] === '富山市' ? 'bold' : 'normal' })
                                }
                            }
                        }
                    },
                    plugins: [ChartDataLabels]
                });

                // --- Chart 2: 男女別 ---
                new Chart(document.getElementById('chart2'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: '男性',
                                data: malePops,
                                backgroundColor: maleColors,
                                borderRadius: 6,
                                borderSkipped: false,
                            },
                            {
                                label: '女性',
                                data: femalePops,
                                backgroundColor: femaleColors,
                                borderRadius: 6,
                                borderSkipped: false,
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: { usePointStyle: true, padding: 20, color: '#b0c4d8' }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(10,15,25,0.9)',
                                titleColor: '#00e5ff',
                                bodyColor: '#e0e0e0',
                                borderColor: 'rgba(0,229,255,0.3)',
                                borderWidth: 1,
                                callbacks: {
                                    title: tooltipTitle,
                                    label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toLocaleString()} 人`
                                }
                            },
                            datalabels: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { callback: (v) => v.toLocaleString() + ' 人', color: '#8899aa' },
                                grid: { color: 'rgba(255,255,255,0.04)' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: {
                                    color: (ctx) => labels[ctx.index] === '富山市' ? '#FFD600' : '#8899aa',
                                    font: (ctx) => ({ weight: labels[ctx.index] === '富山市' ? 'bold' : 'normal' })
                                }
                            }
                        }
                    }
                });

                // --- Chart 3: 年齢階級別（実数・横型積み上げ）---
                new Chart(document.getElementById('chart3'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: '年少人口（0〜14歳）',
                                data: youngPops,
                                backgroundColor: ageBarColors(ageColors.young),
                                borderRadius: 2,
                            },
                            {
                                label: '生産年齢人口（15〜64歳）',
                                data: workingPops,
                                backgroundColor: ageBarColors(ageColors.working),
                                borderRadius: 2,
                            },
                            {
                                label: '前期高齢者（65〜74歳）',
                                data: earlyElderlyPops,
                                backgroundColor: ageBarColors(ageColors.earlyElderly),
                                borderRadius: 2,
                            },
                            {
                                label: '後期高齢者（75歳以上）',
                                data: lateElderlyPops,
                                backgroundColor: ageBarColors(ageColors.lateElderly),
                                borderRadius: 2,
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: { usePointStyle: true, padding: 12, font: { size: 11 }, color: '#b0c4d8' }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(10,15,25,0.9)',
                                titleColor: '#00e5ff',
                                bodyColor: '#e0e0e0',
                                borderColor: 'rgba(0,229,255,0.3)',
                                borderWidth: 1,
                                callbacks: {
                                    title: tooltipTitle,
                                    label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toLocaleString()} 人`
                                }
                            },
                            datalabels: { display: false }
                        },
                        scales: {
                            x: {
                                stacked: true,
                                ticks: { callback: (v) => v.toLocaleString(), color: '#8899aa' },
                                grid: { color: 'rgba(255,255,255,0.04)' }
                            },
                            y: {
                                stacked: true,
                                grid: { display: false },
                                ticks: {
                                    color: (ctx) => labels[ctx.index] === '富山市' ? '#FFD600' : '#8899aa',
                                    font: (ctx) => ({ weight: labels[ctx.index] === '富山市' ? 'bold' : 'normal' })
                                }
                            }
                        }
                    }
                });

                // --- Chart 4: 年齢階級別（構成比・横型100%積み上げ）---
                new Chart(document.getElementById('chart4'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: '年少人口（0〜14歳）',
                                data: youngRatio,
                                backgroundColor: ageBarColors(ageColors.young),
                                borderRadius: 2,
                            },
                            {
                                label: '生産年齢人口（15〜64歳）',
                                data: workingRatio,
                                backgroundColor: ageBarColors(ageColors.working),
                                borderRadius: 2,
                            },
                            {
                                label: '前期高齢者（65〜74歳）',
                                data: earlyElderlyRatio,
                                backgroundColor: ageBarColors(ageColors.earlyElderly),
                                borderRadius: 2,
                            },
                            {
                                label: '後期高齢者（75歳以上）',
                                data: lateElderlyRatio,
                                backgroundColor: ageBarColors(ageColors.lateElderly),
                                borderRadius: 2,
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: { usePointStyle: true, padding: 12, font: { size: 11 }, color: '#b0c4d8' }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(10,15,25,0.9)',
                                titleColor: '#00e5ff',
                                bodyColor: '#e0e0e0',
                                borderColor: 'rgba(0,229,255,0.3)',
                                borderWidth: 1,
                                callbacks: {
                                    title: tooltipTitle,
                                    label: (ctx) => `${ctx.dataset.label}: ${ctx.raw} %`
                                }
                            },
                            datalabels: { display: false }
                        },
                        scales: {
                            x: {
                                stacked: true,
                                max: 100,
                                ticks: { callback: (v) => v + ' %', color: '#8899aa' },
                                grid: { color: 'rgba(255,255,255,0.04)' }
                            },
                            y: {
                                stacked: true,
                                grid: { display: false },
                                ticks: {
                                    color: (ctx) => labels[ctx.index] === '富山市' ? '#FFD600' : '#8899aa',
                                    font: (ctx) => ({ weight: labels[ctx.index] === '富山市' ? 'bold' : 'normal' })
                                }
                            }
                        }
                    }
                });

                // --- 表示切替 ---
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('mainContent').style.display = 'block';

            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.style.display = 'block';
                document.getElementById('errorDetail').innerHTML =
                    `JSONファイルの読み込みに失敗しました。<br><br>` +
                    `<strong>エラー内容:</strong> <code>${err.message}</code><br><br>` +
                    `以下のファイルがHTMLと<strong>同じディレクトリ</strong>に配置されていることを確認してください:<br>` +
                    `・<code>TABLE01 男女別人口.json</code><br>` +
                    `・<code>TABLE03 年齢階級別人口.json</code><br><br>` +
                    `※ ローカル環境では、ローカルサーバー（例: <code>python -m http.server</code>）経由で開いてください。`;
            }
        }

        init();
    </script>
</body>
</html>
